services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dilnova-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/dilnova
      - MIGRATION_DATABASE_URL=postgresql://postgres:password@postgres:5432/dilnova
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dilnova-network

  postgres:
    image: postgres:17-alpine
    container_name: dilnova-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dilnova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dilnova"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dilnova-network

  redis:
    image: redis:7-alpine
    container_name: dilnova-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dilnova-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dilnova-network:
    driver: bridge
