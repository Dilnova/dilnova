name: "Setup Node Environment"
description: "Sets up Node and pnpm, and installs dependencies"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6.0.9
      with:
        version: "11.5.2"

    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 26
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
