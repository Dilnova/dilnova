name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Dependencies
        run: pnpm audit --audit-level=high

      - name: Check Linting
        run: pnpm run lint

      - name: Validate TypeScript
        run: pnpm exec tsc --noEmit

      - name: Verify Database Migrations
        run: pnpm run db:verify

      - name: Run Unit Tests
        run: pnpm run test

      - name: Run Production Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGVzdC5jbGVyay5kZXYk" # gitleaks:allow
          CLERK_SECRET_KEY: "dummy_secret_key_placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
          CLOUDINARY_API_KEY: "placeholder"
          CLOUDINARY_API_SECRET: "placeholder"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
          HEALTH_CHECK_SECRET: "placeholder"
          SMTP_USER: "placeholder"
          SMTP_PASSWORD: "placeholder"
          EMAIL_FROM_ADDRESS: "info@example.com"
          EMAIL_FROM_NAME: "Placeholder"
          SUPERADMIN_USER_IDS: "user_placeholder"
          CLERK_WEBHOOK_SECRET: "whsec_placeholder"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"


  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secrets Scan
        run: docker run -v ${{ github.workspace }}:/src zricethezav/gitleaks:latest detect --source /src -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_DB: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGVzdC5jbGVyay5kZXYk" # gitleaks:allow
      CLERK_SECRET_KEY: "dummy_secret_key_placeholder"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"
      PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
      HEALTH_CHECK_SECRET: "placeholder"
      SMTP_USER: "placeholder"
      SMTP_PASSWORD: "placeholder"
      EMAIL_FROM_ADDRESS: "info@example.com"
      EMAIL_FROM_NAME: "Placeholder"
      SUPERADMIN_USER_IDS: "user_placeholder"
      CLERK_WEBHOOK_SECRET: "whsec_placeholder"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        run: pnpm run db:migrate

      - name: Build Application
        run: pnpm run build

      - name: Start production server (background) and wait
        run: |
          pnpm exec next start -p 3000 > server.log 2>&1 &
          echo $! > server.pid
          pnpm dlx wait-on http://127.0.0.1:3000 -t 120000

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "=== server.log ==="
          cat server.log || true

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: pnpm run test:e2e


