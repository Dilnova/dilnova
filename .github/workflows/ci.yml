name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Audit Dependencies
        run: pnpm audit --audit-level=moderate

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Check Linting
        run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Validate TypeScript
        run: pnpm exec tsc --noEmit

  db-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Verify Database Migrations
        run: pnpm run db:verify

      - name: Test Migrations Execution
        run: pnpm run db:migrate
        env:
          MIGRATION_DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"
          DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Run Unit Tests
        run: pnpm run test

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Run Database Migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"

      - name: Run Production Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
          CLOUDINARY_API_KEY: "placeholder"
          CLOUDINARY_API_SECRET: "placeholder"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
          HEALTH_CHECK_SECRET: "placeholder"
          SMTP_USER: "placeholder"
          SMTP_PASSWORD: "placeholder"
          SENTRY_DSN: "placeholder"
          NEXT_PUBLIC_SENTRY_DSN: "placeholder"
          EMAIL_FROM_ADDRESS: "info@example.com"
          EMAIL_FROM_NAME: "Placeholder"
          SUPERADMIN_USER_IDS: "user_placeholder"
          CLERK_WEBHOOK_SECRET: "whsec_placeholder"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"
          QSTASH_TOKEN: "dummy_qstash_token"


      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  test-e2e:
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/

      - name: Run Database Migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"

      - name: Install Playwright Browsers
        run: pnpm run test:e2e:install

      - name: Run E2E Tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: "postgresql://postgres:password@127.0.0.1:5432/postgres"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Gitleaks Secrets Scan
        run: docker run -v ${{ github.workspace }}:/src zricethezav/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb detect --source /src --redact
