name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: "11.5.2"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Dependencies
        run: pnpm audit --audit-level=moderate

      - name: Check Linting
        run: pnpm run lint

      - name: Validate TypeScript
        run: pnpm exec tsc --noEmit

      - name: Verify Database Migrations
        run: pnpm run db:verify

      - name: Run Unit Tests
        run: pnpm run test

      - name: Run Production Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGVzdC5jbGVyay5kZXYk" # gitleaks:allow
          CLERK_SECRET_KEY: "dummy_secret_key_placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
          CLOUDINARY_API_KEY: "placeholder"
          CLOUDINARY_API_SECRET: "placeholder"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
          HEALTH_CHECK_SECRET: "placeholder"
          SMTP_USER: "placeholder"
          SMTP_PASSWORD: "placeholder"
          SENTRY_DSN: "placeholder"
          EMAIL_FROM_ADDRESS: "info@example.com"
          EMAIL_FROM_NAME: "Placeholder"
          SUPERADMIN_USER_IDS: "user_placeholder"
          CLERK_WEBHOOK_SECRET: "whsec_placeholder"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: 'next.config.ts'


  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks Secrets Scan
        run: docker run -v ${{ github.workspace }}:/src zricethezav/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb detect --source /src -v


