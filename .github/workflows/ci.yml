name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Dependencies
        run: pnpm audit --audit-level=moderate

      - name: Check Linting
        run: pnpm run lint

      - name: Validate TypeScript
        run: pnpm exec tsc --noEmit

      - name: Verify Database Migrations
        run: pnpm run db:verify

      - name: Run Unit Tests
        run: pnpm run test

      - name: Run Production Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGVzdC5jbGVyay5kZXYk" # gitleaks:allow
          CLERK_SECRET_KEY: "dummy_secret_key_placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
          CLOUDINARY_API_KEY: "placeholder"
          CLOUDINARY_API_SECRET: "placeholder"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
          HEALTH_CHECK_SECRET: "placeholder"
          SMTP_USER: "placeholder"
          SMTP_PASSWORD: "placeholder"
          SENTRY_DSN: "placeholder"
          EMAIL_FROM_ADDRESS: "info@example.com"
          EMAIL_FROM_NAME: "Placeholder"
          SUPERADMIN_USER_IDS: "user_placeholder"
          CLERK_WEBHOOK_SECRET: "whsec_placeholder"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'next.config.ts'


  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secrets Scan
        run: docker run -v ${{ github.workspace }}:/src zricethezav/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb detect --source /src -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:15@sha256:67d4ae1588f5a4170a8480fa0bd55a6e0de359830cc2fbed0cf6677ef194eec9
        env:
          POSTGRES_USER: ci
          POSTGRES_DB: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGVzdC5jbGVyay5kZXYk" # gitleaks:allow
      CLERK_SECRET_KEY: "sk_test_ci_dummy"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"
      PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
      HEALTH_CHECK_SECRET: "placeholder"
      SMTP_USER: "placeholder"
      SMTP_PASSWORD: "placeholder"
      SENTRY_DSN: "placeholder"
      EMAIL_FROM_ADDRESS: "info@example.com"
      EMAIL_FROM_NAME: "Placeholder"
      SUPERADMIN_USER_IDS: "user_placeholder"
      CLERK_WEBHOOK_SECRET: "whsec_placeholder"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        run: pnpm run db:migrate

      - name: Build Application
        run: pnpm run build

      - name: Wait for Postgres
        run: npx wait-on tcp:5432 --timeout 60000

      - name: Start production server (background), detect its URL and wait
        run: |
          # Start Next.js using the built output in background and capture logs
          pnpm exec next start -p 3000 > server.log 2>&1 &
          echo $! > server.pid
          # Wait up to 2 minutes for localhost to be available (may still fail if Next binds to another IP)
          npx wait-on http://127.0.0.1:3000 --timeout 120000 || true
          # Determine the served URL from the server output. Next prints a line like: "Network:       http://10.1.0.86:3000"
          SERVED_URL=$(grep -m1 -Eo 'http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+' server.log || true)
          if [ -z "$SERVED_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL=http://127.0.0.1:3000" >> $GITHUB_ENV
            echo "Detected no explicit network URL; using http://127.0.0.1:3000"
          else
            echo "PLAYWRIGHT_BASE_URL=${SERVED_URL}" >> $GITHUB_ENV
            echo "Detected server URL: ${SERVED_URL}"
          fi

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: pnpm run test:e2e

      - name: Dump server log (on failure)
        if: failure()
        run: |
          echo "=== server.log ==="
          tail -n +1 server.log || true
          echo "=== server processes ==="
          ps aux | grep -E "next|node" || true

      - name: Stop server (cleanup)
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; rm -f server.pid; fi
