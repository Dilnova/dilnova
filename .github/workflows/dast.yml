name: DAST Scan

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions tab
  pull_request:
    branches: [ main ]

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15@sha256:67d4ae1588f5a4170a8480fa0bd55a6e0de359830cc2fbed0cf6677ef194eec9
        env:
          POSTGRES_USER: ci
          POSTGRES_DB: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "dummy_public_key_for_testing"
      CLERK_SECRET_KEY: "dummy_secret_key_placeholder"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"
      PII_ENCRYPTION_KEY: "placeholder_key_at_least_32_characters_long"
      HEALTH_CHECK_SECRET: "placeholder"
      SMTP_USER: "placeholder"
      SMTP_PASSWORD: "placeholder"
      SENTRY_DSN: "placeholder"
      EMAIL_FROM_ADDRESS: "info@example.com"
      EMAIL_FROM_NAME: "Placeholder"
      SUPERADMIN_USER_IDS: "user_placeholder"
      CLERK_WEBHOOK_SECRET: "whsec_placeholder"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        run: |
          pnpm run db:migrate > migrate.log 2>&1 || (
            ERR=$(tail -n 40 migrate.log | awk '{printf "%s%%0A", $0}')
            echo "::error::Migration failed! Logs:"
            echo "::error::$ERR"
            exit 1
          )

      - name: Build Application
        run: pnpm run build

      - name: Start Production Server
        run: |
          pnpm exec next start -p 3000 -H 127.0.0.1 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for Server to be Ready
        run: |
          npx wait-on http://127.0.0.1:3000 --timeout 120000 || (
            echo "::error::Next.js Server failed to start! Last logs:"
            ERR=$(tail -n 40 server.log | awk '{printf "%s%%0A", $0}')
            echo "::error::$ERR"
            exit 1
          )

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:3000'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true

      - name: Dump server log (on failure)
        if: failure()
        run: |
          echo "=== server.log ==="
          cat server.log || true

      - name: Stop server (cleanup)
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; rm -f server.pid; fi
