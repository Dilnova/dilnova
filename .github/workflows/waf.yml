name: WAF / Edge Security Verification

on:
  schedule:
    # Run monthly on the 1st of every month at 00:00 UTC
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-waf:
    name: Verify WAF Rules on Staging
    runs-on: ubuntu-latest

    env:
      # Testing against the staging/production domain to ensure edge protections are active
      STAGING_URL: "https://www.dilstar.pp.ua"

    steps:
      - name: Verify Bot Protection (Crawler & Scanner User-Agents)
        run: |
          for ua in "python-requests" "sqlmap" "nikto"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: $ua" "$STAGING_URL")
            if [ "$HTTP_STATUS" != "403" ]; then
              echo "Failed: WAF did not block scanner/bot user-agent '$ua' (Got $HTTP_STATUS)"
              exit 1
            fi
            echo "Passed: Blocked $ua"
          done

      - name: Verify SQLi Protection (Standard, Plus-Encoded & Comment Obfuscated)
        run: |
          PAYLOADS=(
            "?search=%27%20UNION%20SELECT%20null%20--"
            "?search=%27+UNION+SELECT+null+--"
            "?search=UNI/**/ON%20SELECT%20null"
          )
          for payload in "${PAYLOADS[@]}"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/$payload")
            if [ "$HTTP_STATUS" != "403" ]; then
              echo "Failed: WAF did not block SQLi payload '$payload' (Got $HTTP_STATUS)"
              exit 1
            fi
            echo "Passed: Blocked SQLi payload"
          done

      - name: Verify Directory Traversal Protection (Standard & Double-Encoded)
        run: |
          PAYLOADS=(
            "?file=../../../../etc/passwd"
            "?file=%252e%252e%252f%252e%252e%252fetc%252fpasswd"
            "?file=c:\\windows\\win.ini"
          )
          for payload in "${PAYLOADS[@]}"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/$payload")
            if [ "$HTTP_STATUS" != "403" ]; then
              echo "Failed: WAF did not block directory traversal payload '$payload' (Got $HTTP_STATUS)"
              exit 1
            fi
            echo "Passed: Blocked Traversal payload"
          done

      - name: Verify XSS Protection
        run: |
          PAYLOADS=(
            "?q=%3Cscript%3Ealert(1)%3C/script%3E"
            "?q=%3Cimg%20src=x%20onerror=alert(1)%3E"
          )
          for payload in "${PAYLOADS[@]}"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/$payload")
            if [ "$HTTP_STATUS" != "403" ]; then
              echo "Failed: WAF did not block XSS payload '$payload' (Got $HTTP_STATUS)"
              exit 1
            fi
            echo "Passed: Blocked XSS payload"
          done

      - name: Verify Command Injection Protection
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/?cmd=%3B+cat+/var/log/syslog")
          if [ "$HTTP_STATUS" != "403" ]; then
            echo "Failed: WAF did not block command injection payload (Got $HTTP_STATUS)"
            exit 1
          fi
          echo "Passed: Blocked Command Injection payload"
