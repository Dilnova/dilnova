name: Nightly Load Test

on:
  schedule:
    # Run at 02:00 UTC daily to catch performance regressions
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to test against'
        required: false
        default: 'https://www.dilstar.pp.ua'

jobs:
  k6-load-test:
    name: Execute k6 Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup k6
        uses: grafana/setup-k6-action@c00053c996b4061198c9c24a00474b748abdf8b7 # v1

      - name: Run k6 load test
        run: k6 run scripts/load-test-k6.js
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://www.dilstar.pp.ua' }}
          TEST_AUTH_TOKEN: ${{ secrets.TEST_AUTH_TOKEN }}
          TEST_TURNSTILE_TOKEN: ${{ secrets.TEST_TURNSTILE_TOKEN }}
