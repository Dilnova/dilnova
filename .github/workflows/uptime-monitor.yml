name: Uptime Monitor

permissions:
  contents: read

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping API Health Endpoint
        id: ping
        env:
          # Use the production URL variable,
          # or default to the canonical www.dilstar.pp.ua.
          TARGET_URL: ${{ vars.PRODUCTION_APP_URL || 'https://www.dilstar.pp.ua' }}
          HEALTH_SECRET: ${{ secrets.HEALTH_CHECK_SECRET }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          echo "Pinging health endpoint at $TARGET_URL/api/health"

          CURL_ARGS=("-sL" "--location-trusted" "-w" "\n%{http_code}")

          if [ -n "$HEALTH_SECRET" ]; then
            echo "Using authorized detailed probe"
            CURL_ARGS+=("-H" "Authorization: Bearer $HEALTH_SECRET")
          else
            echo "Using public probe"
          fi

          if [ -n "$VERCEL_BYPASS" ]; then
            echo "Using Vercel Protection bypass header"
            CURL_ARGS+=("-H" "x-vercel-protection-bypass: $VERCEL_BYPASS")
          fi

          RESPONSE=$(curl "${CURL_ARGS[@]}" "$TARGET_URL/api/health")

          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Status Code: $HTTP_STATUS"
          echo "Response Body: $HTTP_BODY"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error title=Health Check Failed::The health endpoint returned status $HTTP_STATUS"
            exit 1
          fi

          # Optional: Parse JSON to check internal detailed status if authorized
          if echo "$HTTP_BODY" | grep -q '"status":"degraded"'; then
            echo "::error title=System Degraded::The health check returned 200 but system is in a degraded state (e.g. Upstash rate limiting failed)."
            exit 1
          fi

      - name: Notify on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🚨 Uptime Monitor Failed!
          body: |
            The production health check endpoint returned a non-200 status code. 
            View the workflow run here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: alerts@dilnova.com
          from: "GitHub Actions <alerts@dilnova.com>"
